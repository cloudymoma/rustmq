# cargo-audit configuration — accepted advisories, each with rationale.
#
# Reviewed 2026-07. Every entry below is either (a) upstream-blocked — no fixed version
# is reachable through our dependency graph — or (b) an "unmaintained" advisory with no
# security defect that is not exploitable in RustMQ's deployment. Re-review on every
# dependency upgrade; remove an entry the moment a real fix becomes reachable.
#
# History: a full audit remediation (2026-07) took the tree from 45 advisories to these
# 4 by upgrading wasmtime 25→46 (2 critical sandbox escapes), object_store 0.11→0.14,
# gcp-bigquery-client 0.22→0.28, lru 0.12→0.18, prometheus 0.13→0.14, a broad
# `cargo update`, and removing the unused aws-sdk-s3/aws-config/aws-types and
# google-cloud-googleapis deps (which cleared all four rustls-webpki cert-validation CVEs).

[advisories]
ignore = [
    # quick-xml <0.41 DoS (quadratic duplicate-attribute scan; unbounded namespace
    # allocation). Pulled ONLY by object_store 0.14, which pins quick-xml ^0.40 — 0.41 is
    # not yet adopted upstream, so it is unreachable via cargo. RustMQ uses GCS (JSON)
    # exclusively (object_store "gcp" feature); the XML parser only handles S3/Azure list
    # responses, which are never on our data path. Remove when object_store adopts 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",

    # bincode 1.3 "unmaintained" (no security defect). Used to frame WAL records, epoch
    # reservations, and the cold-index manifest — i.e. the on-disk DURABILITY format.
    # bincode 2.0 changes the wire encoding, which would break on-disk/replica
    # compatibility for zero security benefit. Revisit only via a planned format migration.
    "RUSTSEC-2025-0141",

    # rustls-pemfile 2.2 "unmaintained" (no security defect). Stable PEM cert/key parsing
    # used in TLS loading paths. No exploit surface; migration to rustls-pki-types' pem
    # reader is deferred to avoid churn in security-critical cert-loading code.
    "RUSTSEC-2025-0134",
]
