apiVersion: v1
kind: ConfigMap
metadata:
  name: rustmq-controller-config
  namespace: rustmq
  labels:
    app.kubernetes.io/name: rustmq
    app.kubernetes.io/component: controller-config
data:
  # controller.toml maps 1:1 to the `Config` struct (src/config); the controller
  # binary loads it via Config::from_file. GCS via Workload Identity (no static keys).
  controller.toml: |
    [broker]
    id = "rustmq-controller"
    rack_id = "gke"

    [network]
    quic_listen = "0.0.0.0:9094"
    rpc_listen = "0.0.0.0:9095"
    max_connections = 1000
    connection_timeout_ms = 10000

    [network.quic_config]
    max_concurrent_uni_streams = 100
    max_concurrent_bidi_streams = 100
    max_idle_timeout_ms = 30000
    max_stream_data = 1048576
    max_connection_data = 10485760

    [wal]
    path = "/var/lib/rustmq/wal"
    capacity_bytes = 1073741824
    fsync_on_write = false
    segment_size_bytes = 16777216
    buffer_size = 16384
    upload_interval_ms = 60000
    flush_interval_ms = 500

    [compaction]
    enabled = true
    interval_ms = 30000
    small_threshold_bytes = 10485760
    target_bytes = 67108864
    max_sources = 10

    [cache]
    write_cache_size_bytes = 67108864
    read_cache_size_bytes = 134217728
    eviction_policy = "Moka"

    [object_storage]
    storage_type = "Gcs"
    bucket = "rustmq-messages"  # overridden per-environment by overlay
    region = "us-central1"
    endpoint = "https://storage.googleapis.com"
    multipart_threshold = 104857600
    max_concurrent_uploads = 10

    [controller]
    endpoints = ["rustmq-controller:9094"]
    bind_addr = "0.0.0.0"
    rpc_port = 9095
    admin_port = 9642
    election_timeout_ms = 3000
    heartbeat_interval_ms = 1000

    [controller.raft]
    max_payload_entries = 300
    enable_tick = true
    enable_heartbeat = true
    heartbeat_timeout_ms = 2000
    install_snapshot_timeout_ms = 300000
    max_replication_lag = 1000
    enable_elect = true
    max_uncommitted_entries = 1000
    network_timeout_ms = 10000

    [controller.raft.snapshot_policy]
    log_entries_since_last = 5000
    enable_periodic = true
    periodic_interval_secs = 3600

    [replication]
    min_in_sync_replicas = 2
    ack_timeout_ms = 5000
    max_replication_lag = 1000
    heartbeat_timeout_ms = 30000

    [etl]
    enabled = false
    memory_limit_bytes = 67108864
    execution_timeout_ms = 5000
    max_concurrent_executions = 100
    pipelines = []

    [etl.instance_pool]
    max_pool_size = 50
    warmup_instances = 5
    creation_rate_limit = 10.0
    idle_timeout_seconds = 300
    enable_lru_eviction = true

    [scaling]
    max_concurrent_additions = 3
    max_concurrent_decommissions = 1
    rebalance_timeout_ms = 300000
    traffic_migration_rate = 0.1
    health_check_timeout_ms = 30000

    [operations]
    allow_runtime_config_updates = true
    upgrade_velocity = 1
    graceful_shutdown_timeout_ms = 30000

    [operations.kubernetes]
    use_stateful_sets = true
    pvc_storage_class = "fast-ssd"
    wal_volume_size = "100Gi"
    enable_pod_affinity = true

    [rate_limiting]
    enabled = true

    [rate_limiting.global]
    requests_per_second = 1000
    burst_capacity = 2000
    window_size_secs = 60

    [rate_limiting.per_ip]
    enabled = false
    requests_per_second = 100
    burst_capacity = 200
    window_size_secs = 60
    max_tracked_ips = 10000
    ip_expiry_secs = 3600

    [rate_limiting.endpoints.health]
    enabled = true
    requests_per_second = 100
    burst_capacity = 200
    window_size_secs = 60
    endpoint_patterns = ["/health", "/api/v1/health"]

    [rate_limiting.endpoints.read_operations]
    enabled = true
    requests_per_second = 30
    burst_capacity = 60
    window_size_secs = 60
    endpoint_patterns = ["/api/v1/cluster", "/api/v1/topics", "/api/v1/brokers"]

    [rate_limiting.endpoints.write_operations]
    enabled = true
    requests_per_second = 10
    burst_capacity = 20
    window_size_secs = 60
    endpoint_patterns = ["/api/v1/topics", "/api/v1/acl", "/api/v1/certs"]

    [rate_limiting.endpoints.cluster_operations]
    enabled = true
    requests_per_second = 5
    burst_capacity = 10
    window_size_secs = 60
    endpoint_patterns = ["/api/v1/cluster/*", "/api/v1/upgrade"]

    [rate_limiting.cleanup]
    enabled = true
    cleanup_interval_secs = 300
    max_age_secs = 3600
    max_cleanup_per_run = 1000

    [security.tls]
    enabled = true
    ca_cert_path = "/etc/rustmq/tls/ca.crt"
    server_cert_path = "/etc/rustmq/tls/tls.crt"
    server_key_path = "/etc/rustmq/tls/tls.key"
    client_cert_required = true
    cert_verify_mode = "Full"
    min_tls_version = "1.3"
    cert_refresh_interval_hours = 24
    cipher_suites = ["TLS_AES_256_GCM_SHA384", "TLS_AES_128_GCM_SHA256", "TLS_CHACHA20_POLY1305_SHA256"]

    [security.acl]
    enabled = true
    cache_size_mb = 10
    cache_ttl_seconds = 300
    l2_shard_multiplier = 2.0
    bloom_filter_size = 100000
    batch_fetch_size = 50
    enable_audit_logging = true
    negative_cache_enabled = true

    [security.certificate_management]
    ca_cert_path = "/etc/rustmq/tls/ca.crt"
    ca_key_path = "/etc/rustmq/tls/ca.key"
    cert_validity_days = 365
    auto_renew_before_expiry_days = 30
    crl_check_enabled = true
    ocsp_check_enabled = false

    [security.audit]
    enabled = true
    log_authentication_events = true
    log_authorization_events = false
    log_certificate_events = true
    log_failed_attempts = true
    max_log_size_mb = 100

