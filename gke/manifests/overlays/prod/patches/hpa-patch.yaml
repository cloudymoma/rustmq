apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rustmq-broker
  namespace: rustmq
spec:
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  - type: Pods
    pods:
      metric:
        name: rustmq_broker_partition_count
      target:
        type: AverageValue
        averageValue: "3500"
  - type: Pods
    pods:
      metric:
        name: rustmq_broker_disk_usage
      target:
        type: AverageValue
        averageValue: "0.70"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 900
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
      selectPolicy: Min
