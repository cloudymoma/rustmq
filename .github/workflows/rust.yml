name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build All Targets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler libssl-dev
        
    - name: Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build Main Workspace
      run: cargo build --release --lib --bins

    - name: Build Rust SDK
      run: cd sdk/rust && cargo build --release --lib

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'

    - name: Build Go SDK
      run: cd sdk/go && go build ./...
